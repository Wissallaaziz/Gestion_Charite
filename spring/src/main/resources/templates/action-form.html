<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('Créer une campagne', ~{::section})}">
<body>
    <section>

    <div class="p-3 p-md-4 border rounded-xl bg-light">
        <h3 class="mb-3">Créer une campagne</h3>
        <p class="text-secondary">Publiez une action de charité et lancez votre collecte.</p>

        <form th:action="@{/actions/save}" th:object="${action}" method="post">

            <div class="mb-3">
                <label>Titre</label>
                <input type="text" th:field="*{titre}" class="form-control rounded-xl" placeholder="Ex: Soins pour enfants"/>
            </div>

            <div class="mb-3">
                <label>Description</label>
                <textarea th:field="*{description}" class="form-control rounded-xl" rows="4" placeholder="Décrivez l'impact de la campagne"></textarea>
            </div>

            <div class="mb-3">
                <label>Objectif</label>
                <input type="number" th:field="*{objectif}" class="form-control rounded-xl" min="1"/>
            </div>

            <button class="btn btn-success btn-pill">Créer</button>

        </form>

    </div>

    </section>
</div>

</body>
</html>
