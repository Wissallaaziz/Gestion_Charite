<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout('Gestion des utilisateurs', ~{::section})}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil - CharityConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <section>
        <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
            <div>
                <h2 class="mb-0">Gestion des utilisateurs</h2>
                <p class="text-secondary mb-0">Visualisez et supprimez les comptes enregistrés.</p>
            </div>
            <a class="btn btn-outline-secondary btn-pill" href="/dashboard">Retour dashboard</a>
        </div>

        <div class="card border-0 shadow-sm p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div>
                    <h5 class="mb-0">Liste des utilisateurs</h5>
                    <p class="text-secondary mb-0">Tous les utilisateurs inscrits sur la plateforme.</p>
                </div>
            </div>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Nom</th>
                            <th>Email</th>
                            <th>Rôle</th>
                            <th>Créé le</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${utilisateurs}">
                            <td th:text="${user.id}">1</td>
                            <td th:text="${user.nom}">Nom</td>
                            <td th:text="${user.email}">email@example.com</td>
                            <td th:text="${user.role}">ROLE</td>
                            <td th:text="${user.dateCreation != null ? #dates.format(user.dateCreation, 'dd/MM/yyyy') : '---'}">01/01/2024</td>
                            <td class="text-nowrap">
                                <a th:href="@{/utilisateurs/delete/{id}(id=${user.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Supprimer cet utilisateur ?');">Supprimer</a>
                            </td>
                        </tr>
                        <tr th:if="${utilisateurs.empty}">
                            <td colspan="6" class="text-center text-secondary py-4">Aucun utilisateur trouvé.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</body>
</html>
