<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - CharityConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-lg-5 col-md-7">
                <div class="form-container fade-in">
                    <div class="text-center mb-4">
                        <i class="fas fa-hand-holding-heart fa-3x text-success mb-3"></i>
                        <h2 class="fw-bold">Connexion</h2>
                        <p class="text-muted">Accédez à votre espace et suivez vos contributions</p>
                    </div>

                    <div class="alert alert-success" th:if="${param.registered}">
                        <i class="fas fa-check-circle me-2"></i>Compte créé avec succès. Vous pouvez vous connecter.
                    </div>
                    <div class="alert alert-info" th:if="${param.logout}">
                        <i class="fas fa-info-circle me-2"></i>Vous êtes déconnecté.
                    </div>
                    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

                    <form method="post" action="/login">
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="email"
                                       class="form-control"
                                       name="email"
                                       th:value="${email}"
                                       placeholder="votre@email.com"
                                       required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Mot de passe</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password"
                                       class="form-control"
                                       name="motDePasse"
                                       placeholder="••••••••"
                                       required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg">
                            <i class="fas fa-sign-in-alt me-2"></i>Se connecter
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="mb-0">Pas encore de compte ?</p>
                        <a href="/register" class="text-decoration-none fw-bold">
                            <i class="fas fa-user-plus me-1"></i>Créer un compte
                        </a>
                    </div>

                    <div class="text-center mt-3">
                        <a href="/" class="text-decoration-none text-muted">
                            <i class="fas fa-arrow-left me-1"></i>Retour à l'accueil
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
