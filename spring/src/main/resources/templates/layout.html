<div th:fragment="content(pageContent)">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            background: #f5fbf6;
            color: #163020;
        }
        .app-nav {
            background: linear-gradient(90deg, #1a7f37, #2da44e);
            box-shadow: 0 6px 20px rgba(29, 122, 62, 0.2);
        }
        .app-brand {
            font-weight: 700;
            letter-spacing: .3px;
        }
        .nav-link {
            font-weight: 500;
        }
        .content-card {
            background: #fff;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(31, 111, 55, 0.08);
            padding: 2rem;
        }
        .rounded-xl {
            border-radius: 1rem;
        }
        .btn-pill {
            border-radius: 999px;
            padding: .6rem 1.2rem;
            font-weight: 600;
        }
        .btn-success {
            background-color: #2da44e;
            border-color: #2da44e;
        }
        .btn-outline-success {
            color: #1a7f37;
            border-color: #1a7f37;
        }
        .btn-outline-success:hover {
            background: #1a7f37;
            color: #fff;
        }
        .hover-lift {
            transition: transform .25s ease, box-shadow .25s ease;
        }
        .hover-lift:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 30px rgba(31, 111, 55, 0.15);
        }
    </style>

    <nav class="navbar navbar-expand-lg navbar-dark app-nav">
        <div class="container-fluid">
            <a class="navbar-brand app-brand" href="/">🌍 CharityApp</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Accueil</a></li>
                    <li class="nav-item"><a class="nav-link" href="/actions">Campagnes</a></li>
                    <li class="nav-item"><a class="nav-link" href="/categories">Catégories</a></li>
                    <li class="nav-item" th:if="${session.currentUser != null and session.currentUser.role == 'ADMIN'}">
                        <a class="nav-link" href="/dashboard">Dashboard</a>
                    </li>
                    <li class="nav-item" th:if="${session.currentUser != null and session.currentUser.role == 'ADMIN'}">
                        <a class="nav-link" href="/admin/global-campaigns">Global Campaign Directory</a>
                    </li>
                </ul>
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item" th:if="${session.currentUser == null}">
                        <a class="nav-link" href="/login">Connexion</a>
                    </li>
                    <li class="nav-item" th:if="${session.currentUser == null}">
                        <a class="nav-link" href="/register">Inscription</a>
                    </li>
                    <li class="nav-item" th:if="${session.currentUser != null}">
                        <span class="navbar-text text-white me-3" th:text="'Salut, ' + ${session.currentUser.nom}"></span>
                    </li>
                    <li class="nav-item" th:if="${session.currentUser != null}">
                        <a class="nav-link" href="/logout">Déconnexion</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="content-card">
            <th:block th:replace="${pageContent}"></th:block>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</div>
