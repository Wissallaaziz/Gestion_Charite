<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - CharityConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-lg-6 col-md-8">
                <div class="form-container fade-in">
                    <div class="text-center mb-4">
                        <i class="fas fa-hand-holding-heart fa-3x text-success mb-3"></i>
                        <h2 class="fw-bold">Créer un compte</h2>
                        <p class="text-muted">Inscrivez-vous pour soutenir des campagnes humanitaires</p>
                    </div>

                    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

                    <form method="post" action="/register">
                        <div class="mb-3">
                            <label class="form-label">Nom complet</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user"></i></span>
                                <input type="text"
                                       class="form-control"
                                       name="nom"
                                       th:value="${nom}"
                                       placeholder="Votre nom"
                                       required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="email"
                                       class="form-control"
                                       name="email"
                                       th:value="${email}"
                                       placeholder="votre@email.com"
                                       required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mot de passe</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password"
                                       class="form-control"
                                       name="motDePasse"
                                       minlength="4"
                                       placeholder="••••••••"
                                       required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Type de compte</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-user-tag"></i></span>
                                <select class="form-select" name="role" required>
                                    <option value="DONATEUR" th:selected="${role == null or role == 'DONATEUR'}">Donateur</option>
                                    <option value="ORGANISATION" th:selected="${role == 'ORGANISATION'}">Organisation</option>
                                </select>
                            </div>
                            <small class="text-muted">Choisissez "Donateur" pour faire des dons ou "Organisation" pour créer des campagnes</small>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-lg">
                            <i class="fas fa-user-plus me-2"></i>Créer mon compte
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="mb-0">Vous avez déjà un compte ?</p>
                        <a href="/login" class="text-decoration-none fw-bold">
                            <i class="fas fa-sign-in-alt me-1"></i>Se connecter
                        </a>
                    </div>

                    <div class="text-center mt-3">
                        <a href="/" class="text-decoration-none text-muted">
                            <i class="fas fa-arrow-left me-1"></i>Retour à l'accueil
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
