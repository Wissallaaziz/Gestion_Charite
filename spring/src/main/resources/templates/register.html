<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:replace="~{layout :: content(~{::section})}">
    <section>
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-8">
                <h2 class="mb-3">Creation de compte</h2>
                <p class="text-muted">Inscrivez-vous pour soutenir des campagnes humanitaires.</p>

                <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

                <form method="post" action="/register" class="mt-4 p-3 border rounded-xl bg-light">
                    <div class="mb-3">
                        <label class="form-label">Nom complet</label>
                        <input type="text"
                               class="form-control rounded-xl"
                               name="nom"
                               th:value="${nom}"
                               required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email"
                               class="form-control rounded-xl"
                               name="email"
                               th:value="${email}"
                               required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mot de passe</label>
                        <input type="password"
                               class="form-control rounded-xl"
                               name="motDePasse"
                               minlength="4"
                               required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Type de compte</label>
                        <select class="form-select rounded-xl" name="role" required>
                            <option value="USER" th:selected="${role == null or role == 'USER'}">Utilisateur (donateur)</option>
                            <option value="ORGANISATION" th:selected="${role == 'ORGANISATION'}">Organisation</option>
                        </select>
                    </div>
                    <button class="btn btn-success btn-pill w-100">
                        <i class="fa-solid fa-user-plus me-1"></i> Creer mon compte
                    </button>
                </form>

                <p class="mt-3 mb-0 text-center">
                    Vous avez deja un compte ?
                    <a href="/login">Se connecter</a>
                </p>
            </div>
        </div>
    </section>
</div>

</body>
</html>
