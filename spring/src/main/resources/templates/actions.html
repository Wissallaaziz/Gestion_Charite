<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:replace="~{layout :: content(~{::section})}">
    <section>
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h2 class="mb-0">Campagnes de charité</h2>
        <a class="btn btn-success btn-pill"
           href="/actions/form"
           th:if="${session.currentUser != null and session.currentUser.role == 'ORGANISATION'}">
            Créer une campagne
        </a>
    </div>

    <form method="get" action="/actions" class="row g-2 mb-4">
        <div class="col-md-4">
            <select class="form-select rounded-xl" name="category">
                <option value="">Toutes les catégories</option>
                <option value="Santé" th:selected="${selectedCategory == 'Santé'}">Santé</option>
                <option value="Éducation" th:selected="${selectedCategory == 'Éducation'}">Éducation</option>
                <option value="Nourriture" th:selected="${selectedCategory == 'Nourriture'}">Nourriture</option>
                <option value="Orphelins" th:selected="${selectedCategory == 'Orphelins'}">Orphelins</option>
                <option value="Ramadan / Zakat" th:selected="${selectedCategory == 'Ramadan / Zakat'}">Ramadan / Zakat</option>
            </select>
        </div>
        <div class="col-auto">
            <button class="btn btn-outline-success btn-pill">Filtrer</button>
        </div>
        <div class="col-auto" th:if="${selectedCategory != null and selectedCategory != ''}">
            <a class="btn btn-light btn-pill border" href="/actions">Réinitialiser</a>
        </div>
    </form>

    <div class="row g-4">

        <div class="col-md-6 col-lg-4" th:each="a : ${actions}">
            <div class="card border-0 shadow-sm h-100 hover-lift">
                <img src="https://images.unsplash.com/photo-1593113598332-cd59a93f7f70?auto=format&fit=crop&w=900&q=80"
                     class="card-img-top" alt="Campagne">
                <div class="card-body">

                    <h5 class="card-title" th:text="${a.titre}"></h5>

                    <p class="card-text text-secondary" th:text="${a.description}"></p>

                    <p class="small mb-1" th:if="${a.organisation != null}">
                        <i class="fa-regular fa-building me-1"></i>
                        <span th:text="${a.organisation.nom}"></span>
                    </p>

                    <p class="small mb-1">
                        <i class="fa-solid fa-bullseye me-1 text-success"></i>
                        Objectif:
                        <b th:text="${#numbers.formatDecimal(a.objectifMontant, 1, 0)}"></b> DH
                    </p>
                    <p class="small">
                        <i class="fa-solid fa-hand-holding-heart me-1 text-success"></i>
                        Collecté:
                        <b th:text="${#numbers.formatDecimal(a.montantCollecte, 1, 0)}"></b> DH
                    </p>
                    <p class="small text-primary fw-semibold mb-2" th:if="${isDonorUser}">
                        <i class="fa-solid fa-wallet me-1"></i>
                        Votre don:
                        <span th:text="${#numbers.formatDecimal(donationByAction[a.id] != null ? donationByAction[a.id] : 0, 1, 0)}"></span> DH
                    </p>

                    <div class="progress mb-3" role="progressbar">
                        <div class="progress-bar bg-success"
                             th:style="'width:' + ${a.objectifMontant > 0 ? (a.montantCollecte * 100 / a.objectifMontant) : 0} + '%'"></div>
                    </div>

                    <div class="d-flex gap-2">
                        <a class="btn btn-success btn-sm btn-pill" th:href="@{'/don/form/' + ${a.id}}">
                            Donner maintenant
                        </a>
                        <a class="btn btn-outline-success btn-sm btn-pill" th:href="@{'/actions/' + ${a.id}}">
                            Voir plus
                        </a>
                    </div>

                </div>
            </div>
        </div>
        <div class="col-12" th:if="${#lists.isEmpty(actions)}">
            <div class="alert alert-light border">Aucune campagne ne correspond à ce filtre.</div>
        </div>

    </div>

    </section>
</div>

</body>
</html>
